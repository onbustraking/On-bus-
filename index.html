<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Oh my bus - बस ट्रैकर</title>

    <!-- PWA Configuration -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF9F1A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Hind:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF9F1A;
            --background: #F8F9FA;
            --surface: #FFFFFF;
            --surface2: #F1F5F9;
            --border: #E2E8F0;
            --text: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --success: #22C55E;
            --warning: #F59E0B;
            --error: #EF4444;
            --hero-start: #FFF7ED;
            --hero-end: #F8F9FA;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -1px rgba(0,0,0,0.06);
            --font-family: 'Inter', 'Hind', sans-serif;
        }

        .dark-theme {
            --primary: #FF9F1A;
            --background: #09090B;
            --surface: #0D0D10;
            --surface2: #151517;
            --border: #242429;
            --text: #FAFAFA;
            --text-secondary: #9CA3AF;
            --text-muted: #4B5563;
            --success: #22C55E;
            --warning: #F59E0B;
            --error: #EF4444;
            --hero-start: #1A0E00;
            --hero-end: #09090B;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.3),0 2px 4px -1px rgba(0,0,0,0.2);
        }

        body {
            font-family: var(--font-family);
            background: var(--background);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        #root {
            max-width: 450px;
            width: 100%;
            min-height: 100vh;
            background: var(--background);
            position: relative;
        }

        .app-container {
            min-height: 100vh;
            padding-bottom: 80px;
            background: var(--background);
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--hero-start), var(--hero-end));
            padding: 60px 20px 40px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            position: relative;
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: nowrap;
            gap: 12px;
            overflow-x: auto;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .badge {
            background: rgba(255, 159, 26, 0.1);
            border: 1px solid rgba(255, 159, 26, 0.3);
            border-radius: 30px;
            padding: 6px 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            width: auto;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .badge-text {
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
        }

        .icon-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--primary);
            font-size: 20px;
            flex-shrink: 0;
        }

        .download-header-btn {
            background: linear-gradient(135deg, #FF9F1A, #E8860D);
            border: none;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: #09090B;
            font-weight: 700;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.3);
            margin-bottom: 20px;
        }
        
        .download-header-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 159, 26, 0.3);
        }
        
        .download-header-btn i {
            font-size: 18px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 10px;
        }

        .hero-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
        }

        .hero-title .highlight {
            color: var(--primary);
        }

        /* Search Card */
        .search-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            margin: -30px 20px 20px;
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 10;
        }

        .search-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .search-header i {
            color: var(--primary);
            font-size: 18px;
        }

        .search-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .station-row {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .station-row:hover {
            border-color: var(--primary);
        }

        .station-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .station-dot.start {
            background: var(--primary);
            border: 2px solid rgba(255, 159, 26, 0.3);
        }

        .station-dot.end {
            background: var(--text-muted);
            border-radius: 2px;
        }

        .station-text {
            flex: 1;
            font-size: 15px;
            color: var(--text);
        }

        .station-text.placeholder {
            color: var(--text-muted);
        }

        /* No chevron icon */
        .station-row i.fa-chevron-down {
            display: none;
        }

        .divider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

        .divider {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .swap-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 159, 26, 0.1);
            border: 1px solid rgba(255, 159, 26, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .swap-btn i {
            color: var(--primary);
            font-size: 18px;
        }

        .swap-btn:hover {
            transform: rotate(180deg);
        }

        .search-btn {
            background: linear-gradient(135deg, #FF9F1A, #E8860D);
            border: none;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
            color: #09090B;
            font-weight: 700;
            font-size: 16px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 159, 26, 0.3);
        }

        /* Bus Card */
        .bus-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            margin: 0 20px 12px;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.3s;
        }

        .bus-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .bus-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .bus-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bus-badge {
            background: rgba(255, 159, 26, 0.1);
            border: 1px solid rgba(255, 159, 26, 0.3);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
        }

        .bus-info h4 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .bus-info .bus-number {
            font-size: 12px;
            color: var(--text-muted);
        }

        .bus-fare {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .route-row {
            background: var(--surface2);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
        }

        .route-station {
            flex: 1;
            text-align: center;
        }

        .route-station .station-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }

        .route-station .station-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        .route-icon {
            color: var(--primary);
        }

        .bus-amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
            padding: 8px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .amenity-tag {
            background: var(--surface2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .amenity-tag i {
            color: var(--primary);
            font-size: 12px;
        }

        .bus-details {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 12px 0;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .detail-item i {
            color: var(--primary);
            font-size: 14px;
        }

        .trip-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-top: 1px solid var(--border);
            cursor: pointer;
        }

        .trip-item:hover {
            background: var(--surface2);
        }

        .trip-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trip-time {
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }

        .trip-type {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .trip-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .status-live {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .status-upcoming {
            background: rgba(255, 159, 26, 0.1);
            color: var(--primary);
        }

        .status-departed {
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-secondary);
        }

        /* Progress bar */
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 3px;
            width: 0%;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            max-width: 450px;
            width: 100%;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: color 0.3s;
            text-decoration: none;
            padding: 4px 0;
            width: 25%;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }

        /* Install Prompt */
        .install-prompt {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 400px;
            width: calc(100% - 40px);
            background: var(--primary);
            color: #09090B;
            border-radius: 60px;
            padding: 12px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(255, 159, 26, 0.4);
            z-index: 1000;
        }

        .install-prompt span {
            font-size: 14px;
            font-weight: 600;
        }

        .install-btn {
            background: #09090B;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .install-btn:hover {
            opacity: 0.9;
        }

        /* Modal Base */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 2;
        }

        .modal-header h4 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-body {
            padding: 8px;
        }

        /* Picker Modal Search */
        .picker-search {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .picker-search input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--background);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .picker-search input:focus {
            border-color: var(--primary);
        }

        .picker-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.3s;
        }

        .picker-item:hover {
            background: var(--surface2);
        }

        .picker-item i {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .picker-item span {
            flex: 1;
            color: var(--text);
            font-size: 14px;
        }

        .picker-item .check {
            color: var(--primary);
            display: none;
        }

        .picker-item.selected .check {
            display: block;
        }

        /* Settings Modal */
        .settings-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .settings-item:hover {
            background: var(--surface2);
        }

        .settings-item i {
            width: 24px;
            color: var(--primary);
            font-size: 18px;
        }

        .settings-item .settings-text {
            flex: 1;
            color: var(--text);
            font-size: 15px;
        }

        .settings-item .settings-badge {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Home Suggestions */
        .suggestions-section {
            margin: 20px 20px 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
        }

        .suggestion-chips {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }

        .suggestion-chips::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--primary);
            background: rgba(255, 159, 26, 0.05);
        }

        .chip i {
            color: var(--primary);
            margin-right: 6px;
        }

        /* Feature Boxes */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 0 20px 20px;
        }

        .feature-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .feature-box:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .feature-box i {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .feature-box span {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.share-btn {
            width: 36px;
            height: 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .action-btn.ticket-btn {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            gap: 6px;
            font-size: 13px;
        }

        .action-btn.track-btn {
            flex: 1;
            background: linear-gradient(135deg, #FF9F1A, #E8860D);
            border: none;
            border-radius: 8px;
            padding: 8px;
            gap: 6px;
            font-size: 13px;
            color: #09090B;
        }

        #pageContainer {
            min-height: calc(100vh - 80px);
        }

        /* Bus Search Card */
        .bus-search-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            margin: 20px;
            box-shadow: var(--card-shadow);
        }

        .bus-search-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .bus-search-header i {
            color: var(--primary);
            font-size: 18px;
        }

        .bus-search-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .bus-search-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--background);
            color: var(--text);
            font-size: 15px;
            outline: none;
            margin-bottom: 0;
        }

        .bus-search-input:focus {
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="app-container">
            <!-- Install Prompt -->
            <div class="install-prompt" id="installPrompt">
                <span>📲 OB ऐप इंस्टॉल करें</span>

        // --- बैक बटन अपडेट: नेविगेशन स्टैक ---
        let navigationStack = [{ page: 'home' }];

        function navigateTo(page, params = {}) {
            navigationStack.push({ page, params });

            updateNavActive(page);

            if (page === 'home') renderHome();
            else if (page === 'buses') renderBusesPage();
            else if (page === 'favorites') renderFavorites();

            else if (page === 'busResults') renderBusResults(params.fromId, params.toId, params.results);
            else if (page === 'busDetail') internalShowBusDetail(params.busId, params.tripId);

        window.goBack = function() {
            if (navigationStack.length > 1) {
                navigationStack.pop();
                const lastState = navigationStack[navigationStack.length - 1];
                currentPage = lastState.page;
                renderPageByState(lastState.page, lastState.params);
                updateNavActive(lastState.page);
            } else {
                currentPage = 'home';
                renderHome();
                updateNavActive('home');

            goBack();

        // ==================== PWA इंस्टॉल ====================

        window.addEventListener('beforeinstallprompt', (e) => {

        // ==================== कॉमन फंक्शन ====================
        function getStationName(id) {
            if (!id) return '';
            return stations[id]?.nameHindi || stations[id]?.name || id;
        }

        function getStationDisplayName(id) {
            const station = stations[id];
            if (!station) return id;
            const name = station.nameHindi || station.name || id;
            const city = station.city || station.cityName || station.district || '';
            if (city) return `${name}, ${city}`;
            return name;
        }

        function getAllStationNames(id) {
            const station = stations[id];
            if (!station) return [id];
            let names = [station.name, station.nameHindi];
            if (station.suggestions && Array.isArray(station.suggestions)) {
                names = [...names, ...station.suggestions];
            }
            const city = station.city || station.cityName || station.district || '';
            if (city) {
                names.push(city);
                names.push(station.name + ' ' + city);
                names.push((station.nameHindi || station.name) + ' ' + city);

            return names.filter(n => n);

        // ==================== रीसेंट स्टेशन (LocalStorage) ====================
        const RECENT_STATIONS_KEY = 'recentStations';

            return JSON.parse(localStorage.getItem(RECENT_STATIONS_KEY) || '[]');

            let recents = getRecentStations();
            recents = recents.filter(id => id !== stationId);

            recents = recents.slice(0, 5);

            localStorage.removeItem(RECENT_STATIONS_KEY);

        // ==================== पिकर मोडल (रीसेंट स्टेशन + सर्च) ====================
        const pickerModal = document.getElementById('pickerModal');

        const stationSearchInput = document.getElementById('stationSearchInput');

        function renderPickerList(filterText = '') {
            pickerList.innerHTML = '';

            if (!filterText.trim()) {
                const recents = getRecentStations();
                if (recents.length === 0) {
                    pickerList.innerHTML = '<div class="empty-state" style="padding:20px; text-align:center;">🔍 कोई हालिया स्टेशन नहीं</div>';
                    return;
                }
                recents.forEach(id => {
                    const station = stations[id];
                    if (!station) return;
                    const displayName = getStationDisplayName(id);
                    const item = document.createElement('div');
                    item.className = `picker-item ${(pickerMode === 'from' ? fromId : toId) === id ? 'selected' : ''}`;
                    item.innerHTML = `<i class="fas fa-clock"></i><span>${displayName}</span><i class="fas fa-check check"></i>`;
                    item.addEventListener('click', () => {
                        selectStation(id);
                    });

                });
                const clearBtn = document.createElement('div');
                clearBtn.className = 'picker-item';
                clearBtn.style.borderBottom = 'none';
                clearBtn.style.justifyContent = 'center';
                clearBtn.style.color = 'var(--error)';
                clearBtn.innerHTML = `<i class="fas fa-trash-alt"></i><span style="flex:none;">हालिया स्टेशन साफ करें</span>`;
                clearBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    clearRecentStations();
                    renderPickerList('');

                pickerList.appendChild(clearBtn);
                return;

            const searchTerm = filterText.toLowerCase();
            const filtered = allStationsList.filter(s => {
                const allNames = getAllStationNames(s.id).map(n => n.toLowerCase());
                return allNames.some(name => name.includes(searchTerm));
            });

            if (filtered.length === 0) {
                pickerList.innerHTML = '<div class="empty-state" style="padding:20px; text-align:center;">❌ कोई स्टेशन नहीं मिला</div>';

                item.className = `picker-item ${(pickerMode === 'from' ? fromId : toId) === id ? 'selected' : ''}`;
                item.innerHTML = `<i class="fas fa-map-marker-alt"></i><span>${displayName}</span><i class="fas fa-check check"></i>`;
                item.addEventListener('click', () => {
                    selectStation(id);
                });
                pickerList.appendChild(item);
            });
        }

        function selectStation(stationId) {
            if (pickerMode === 'from') {
                fromId = stationId;
                localStorage.setItem('lastFromId', fromId);
            } else {
                toId = stationId;
                localStorage.setItem('lastToId', toId);

            addToRecentStations(stationId);
            updateStationTexts();
            pickerModal.classList.remove('show');
            stationSearchInput.value = '';

        pickerModal.addEventListener('click', (e) => { if (e.target === pickerModal) pickerModal.classList.remove('show'); });

        // ==================== सेटिंग मोडल ====================
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        const settingsBody = document.getElementById('settingsBody');

        function renderSettings() {
            settingsBody.innerHTML = `
                <div class="settings-item" id="settingsNotifications">

        // ==================== एमेनिटी आइकन ====================

        // ==================== रेंडर बस कार्ड (सिर्फ उपलब्ध सीटें) ====================

        // ==================== रीसेंट सर्च ====================
        function saveRecentSearch(from, to) {
            if (!from || !to) return;
            let recents = JSON.parse(localStorage.getItem('recentSearches') || '[]');
            const key = `${from}|${to}`;
            const existingIndex = recents.findIndex(r => `${r.from}|${r.to}` === key);
            if (existingIndex !== -1) {
                recents.splice(existingIndex, 1);
            }
            recents.unshift({ from, to, timestamp: Date.now() });
            recents = recents.slice(0, 6);
            localStorage.setItem('recentSearches', JSON.stringify(recents));
            if (currentPage === 'home') {
                renderHome();
            }
        }

        function getRecentSearches() {
            return JSON.parse(localStorage.getItem('recentSearches') || '[]');
        }

        // ==================== सर्च फंक्शन (नई सॉर्टिंग) ====================
        function parseTime(t) {
            const [h, m] = t.split(':').map(Number);
            return h * 60 + (m || 0);
        }

        function getTripStatus(trip) {
            const now = new Date();
            const current = now.getHours() * 60 + now.getMinutes();
            const dep = parseTime(trip.departure) + (trip.delay || 0);
            const arr = parseTime(trip.arrival) + (trip.delay || 0);
            if (current < dep) return { status: 'upcoming', text: 'आने वाली', class: 'status-upcoming', order: 1 };
            if (current >= dep && current <= arr) return { status: 'live', text: 'चल रही', class: 'status-live', order: 2 };
            return { status: 'departed', text: 'समाप्त', class: 'status-departed', order: 3 };
        }

        function getLiveProgress(trip) {
            const now = new Date();
            const current = now.getHours() * 60 + now.getMinutes();
            const dep = parseTime(trip.departure) + (trip.delay || 0);
            const arr = parseTime(trip.arrival) + (trip.delay || 0);
            if (current < dep) return 0;
            if (current > arr) return 100;
            return Math.min(100, Math.max(0, ((current - dep) / (arr - dep)) * 100));
        }

        function getStopsForTrip(trip, route) {
            if (!route || !route.stops) return [];
            let stops = route.stops;
            if (trip.direction !== 'forward') {
                stops = [...stops].reverse();
            }
            return stops;
        }

        function getStopTimes(trip, route) {
            const stops = getStopsForTrip(trip, route);
            if (!stops.length) return [];
            const depMinutes = parseTime(trip.departure) + (trip.delay || 0);
            const result = [];
            for (let stop of stops) {
                let stopTime = null;
                if (stop.timeOffset !== undefined) {
                    stopTime = formatTime(depMinutes + stop.timeOffset);
                } else if (stop.time) {
                    stopTime = stop.time;
                }
                result.push({
                    stationId: stop.stationId,
                    time: stopTime
                });
            }
            return result;
        }

        function formatTime(minutes) {
            const h = Math.floor(minutes / 60) % 24;
            const m = minutes % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        }

        function getCurrentLocation(trip, route) {
            if (!route) return 'रूट डेटा नहीं';
            const stops = getStopsForTrip(trip, route);
            if (!stops.length) return 'रूट डेटा नहीं';
            const now = new Date();
            const current = now.getHours() * 60 + now.getMinutes();
            const dep = parseTime(trip.departure) + (trip.delay || 0);
            const arr = parseTime(trip.arrival) + (trip.delay || 0);
            if (current < dep) return 'अभी रवाना नहीं हुई';
            if (current > arr) return 'गंतव्य पर पहुँच चुकी';
            const travelTime = arr - dep;
            const elapsed = current - dep;
            const fraction = elapsed / travelTime;
            const totalStops = stops.length;
            const stopIndex = Math.floor(fraction * (totalStops - 1));
            if (stopIndex >= totalStops - 1) return getStationName(stops[totalStops-1].stationId);
            const fromStop = getStationName(stops[stopIndex].stationId);
            const toStop = getStationName(stops[stopIndex+1].stationId);
            return `${fromStop} और ${toStop} के बीच`;
        }

        // ==================== पसंदीदा फंक्शन ====================
        function toggleFavorite(busId, el) {
            const idx = favorites.indexOf(busId);
            if (idx === -1) {
                favorites.push(busId);
                el.classList.replace('far', 'fas');
                el.style.color = '#EF4444';
            } else {
                favorites.splice(idx, 1);
                el.classList.replace('fas', 'far');
                el.style.color = '#94A3B8';
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            if (currentPage === 'favorites') setTimeout(renderFavorites, 300);
        }

        function isFavorite(busId) {
            return favorites.includes(busId);
        }

        // ==================== सर्च फंक्शन (बसों के लिए) ====================
        function searchBuses(from, to) {
            const results = [];
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();

            Object.entries(buses).forEach(([id, bus]) => {
                const route = routes[bus.routeId];
                if (!route) return;

                const stops = route.stops.map(s => s.stationId);
                const fromIdx = stops.indexOf(from);
                const toIdx = stops.indexOf(to);
                if (fromIdx === -1 || toIdx === -1) return;

                let direction = null;
                if (fromIdx < toIdx) direction = 'forward';
                else if (fromIdx > toIdx) direction = 'backward';
                else return;

                const validTrips = bus.trips.filter(trip => trip.direction === direction);
                if (validTrips.length === 0) return;

                let bestTrip = null;
                let bestOrder = 999;
                let bestDepTime = null;

                for (const trip of validTrips) {
                    const depMinutes = parseTime(trip.departure) + (trip.delay || 0);
                    const status = getTripStatus(trip);
                    let order = status.order;
                    let sortValue = depMinutes;
                    if (status.status === 'upcoming') {
                        order = 1;
                        sortValue = depMinutes;
                    } else if (status.status === 'live') {
                        order = 2;
                        sortValue = depMinutes;
                    } else {
                        order = 3;
                        sortValue = -depMinutes;
                    }

                    if (bestTrip === null ||
                        order < bestOrder ||
                        (order === bestOrder && (order === 1 ? sortValue < bestDepTime : (order === 3 ? sortValue > bestDepTime : false)))) {
                        bestTrip = trip;
                        bestOrder = order;
                        bestDepTime = sortValue;
                    }
                }

                if (bestTrip) {
                    results.push({ id, bus, bestTrip });
                }
            });

            results.sort((a, b) => {
                const statusA = getTripStatus(a.bestTrip);
                const statusB = getTripStatus(b.bestTrip);
                if (statusA.order !== statusB.order) return statusA.order - statusB.order;
                if (statusA.order === 1) {
                    const depA = parseTime(a.bestTrip.departure) + (a.bestTrip.delay || 0);
                    const depB = parseTime(b.bestTrip.departure) + (b.bestTrip.delay || 0);
                    return depA - depB;
                } else if (statusA.order === 3) {
                    const depA = parseTime(a.bestTrip.departure) + (a.bestTrip.delay || 0);
                    const depB = parseTime(b.bestTrip.departure) + (b.bestTrip.delay || 0);
                    return depB - depA;
                }
                return 0;
            });

            return results.map(r => [r.id, r.bus]);
        }

            return Object.entries(buses).filter(([_, bus]) =>

            );
        }

                db.ref('buses').once('value')

                    nameHindi: s.nameHindi || s.name 
                }));
                window.history.replaceState({ stackIndex: 0 }, "");
                renderHome();
            }).catch(console.error);
        }

        const APK_URL = 'https://github.com/onbustraking/On-bus-/releases/download/v1.0/app-release.1.apk';
        window.downloadApp = function() {
            let downloadCount = localStorage.getItem('downloadCount') ? parseInt(localStorage.getItem('downloadCount')) : 1234;
            downloadCount++;
            localStorage.setItem('downloadCount', downloadCount);
            gtag('event', 'download', { 'event_category': 'app', 'event_label': 'on-bus-apk', 'value': downloadCount });
            const link = document.createElement('a');
            link.href = APK_URL;
            link.download = 'on-bus-app.apk';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        loadFirebaseData();
    </script>
</body>
</html>
